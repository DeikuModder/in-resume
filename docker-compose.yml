services:
  mongodb:
    image: mongo:7
    container_name: in-resume-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: in-resume

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: in-resume-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/in-resume

volumes:
  mongo-data:
